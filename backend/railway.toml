[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Wrap in `sh -c` so $PORT (injected by Railway at runtime) is expanded
# by the shell. Without `sh -c`, the command is exec'd directly and
# uvicorn receives the literal string "$PORT" — invalid integer.
startCommand = "sh -c 'uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 1'"
healthcheckPath = "/health"
# 90s is generous — covers slow Postgres connection retries on cold boot.
# Once persistence is wired correctly, startup is ~1s.
healthcheckTimeout = 90
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
